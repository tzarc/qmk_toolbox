name: CI

on:
  push:
    branches: [master, avalonia-net10-port]
  pull_request:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build, Test, and Package
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'

    - name: Build and Test
      run: |
        dotnet restore src/QmkToolbox.slnx
        dotnet build src/QmkToolbox.slnx --configuration Release --no-restore
        dotnet test src/QmkToolbox.Tests/QmkToolbox.Tests.csproj --no-restore --no-build --configuration Release

    - name: Publish
      run: |
        ./scripts/publish-all.sh
        ./scripts/make-release-artifacts.sh
        ls -1alR artifacts/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: qmk_toolbox-all
        path: artifacts/

  publish_release:
    needs: build
    name: Publish Release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: qmk_toolbox-all

    - name: Delete existing release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release delete --repo ${{ github.repository }} ${{ github.ref_name }} --yes || true

    - uses: softprops/action-gh-release@v3
      with:
        make_latest: true
        files: |
          QMK Toolbox.app.zip
          QMK Toolbox.dmg
          QMK Toolbox.pkg
          qmk_toolbox-linux-x64
          qmk_toolbox-linux-arm64
          qmk_toolbox.exe
          qmk_toolbox_install.exe

  publish_beta:
    needs: build
    name: Publish Beta
    if: github.event_name == 'push' && github.ref == 'refs/heads/avalonia-net10-port'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: qmk_toolbox-all

    - name: Delete existing beta release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release delete --repo ${{ github.repository }} beta-xplat --yes --cleanup-tag || true

    - uses: softprops/action-gh-release@v3
      with:
        tag_name: beta-xplat
        name: Beta-CrossPlatform
        prerelease: true
        make_latest: false
        target_commitish: ${{ github.sha }}
        files: |
          QMK Toolbox.app.zip
          QMK Toolbox.dmg
          QMK Toolbox.pkg
          qmk_toolbox-linux-x64
          qmk_toolbox-linux-arm64
          qmk_toolbox.exe
          qmk_toolbox_install.exe
